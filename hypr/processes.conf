#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.) Or execute your favorite apps at launch like this:

exec-once = mako &
exec-once = nm-applet & 
# exec-once = systemctl --user start hyprpolkitagent 
exec-once = brightnessctl set 100%
# exec = hyprsunset -t 6000
exec = otd-daemon &
exec-once = swww-daemon &
# exec-once = hyprpolkitagent &
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = quickshell --config hyprshell &

###########################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24 
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/ Please note permission changes here require a Hyprland restart and are not applied 
# on-the-fly for security reasons

# ecosystem { enforce_permissions = 1 }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow 
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

